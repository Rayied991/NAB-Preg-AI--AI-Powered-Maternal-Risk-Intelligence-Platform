version: "3.9"

services:

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile

    container_name: nabpreg-backend

    ports:
      - "8000:8000"

    env_file:
      - ../../backend/.env

    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile

    container_name: nabpreg-frontend

    ports:
      - "3000:3000"

    env_file:
      - ../../frontend/.env.local

    depends_on:
      - backend

    restart: unless-stopped